<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recipe Book</title>
        <meta name="description" content="RecipeBook helps you find delicious recipes!">
        <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Recipe Book">
        <meta property="og:description" content="Find delicious recipes sour, sweet or savory!">
        <meta property="og:url" content="https://stardustpaladin.github.io/wdd131/Recipe/index.html">
        <meta property="og:image" content="social-preview-image.png">
        <meta name="twitter:card" content="Socail Preveiw Image">
        <meta name="twitter:title" content="Recipe Book">
        <meta name="twitter:description" content="Find delicious recipes sour, sweet or savory!">
        <meta name="twitter:image" content="social-preview-image.png">
        <link rel="icon" href="/favicon.ico">
        <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
  <body>
      <header class="logo-area">
        <img src="images/recipe-book.png" alt="Recipe Book Logo">
        <h1>RecipeBook</h1>
    </header>
      <div class="search-area">
        <input type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="search">
    </div>
    <main>
      <section class="recipe-card">
        <img src="images/apple-crisp.jpg" alt="Apple Crisp">
        <div class="recipe-info">
            <span class="tag">dessert</span>
            <h2>Apple Crisp</h2>
        <span 
        class="rating"
        role="img"
        aria-label="Rating: 4 out of 5 stars"
        >
        <span aria-hidden="true"class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star-empty">☆</span>
        <p class="description">
            This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
        </p>
    </div>
    </section>
    </main>
  </body>
  <footer>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
        Recipe icons created by Freepik - Flaticon
    </a>
    <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
</footer>
</html>
