<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A character card for a game or story, showcasing the character's attributes, skills, and background information.">
    <meta property="og:url" content="stardustpaladin.github.io/wdd131/charactercard">
    <link rel="icon" href="/favicon.ico">
</head>
<body>
<div id="characterCard">
    <img id="charImage"/>
    <h3 id="charName"></h3>
    <p>Class: <span id="charClass"></span></p>
    <p>Level: <span id="charLevel"></span></p>
    <p>Health: <span id="charHealth"></span></p>
    <button id="atkBtn">Attack</button>
    <button id="lvlUpBtn">Level Up</button>
</div>
</body>
</html>
